name: signal

services:
  postgres:
    image: postgres:16
    container_name: signal-postgres
    environment:
      POSTGRES_DB: ${PG_DB:-signal}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DB:-signal}"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:26.3.2
    container_name: signal-clickhouse
    environment:
      CLICKHOUSE_DB: ${CH_DB:-signal}
      CLICKHOUSE_USER: ${CH_USER:-default}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD:-clickhouse}
    ports:
      - "${CH_HTTP_PORT:-8123}:8123"   # HTTP — used by the workers
      - "${CH_TCP_PORT:-9000}:9000"    # native client
    ulimits:
      nofile: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  ch_data:
