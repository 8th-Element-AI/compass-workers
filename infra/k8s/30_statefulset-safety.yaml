apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: signal-worker-safety
  namespace: signal
  labels:
    app: signal-worker
    lens: safety
spec:
  serviceName: signal-worker-safety   # must match the headless Service below
  replicas: 1                         # start at 1; use scale-safety.ps1 to change
  podManagementPolicy: Parallel       # all pods start in parallel, no sequential wait
  selector:
    matchLabels:
      app: signal-worker
      lens: safety
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: signal-worker
        lens: safety
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 120   # bigger — safety batches take longer to drain
      containers:
      - name: worker
        image: signal-worker:safety
        imagePullPolicy: IfNotPresent
        env:
        # POD_NAME → derived WORKER_PARTITION_INDEX at startup (see run_worker.py)
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # MUST equal spec.replicas above. scale-safety.ps1 keeps them in sync.
        - name: WORKER_PARTITION_COUNT
          value: "1"
        envFrom:
        - configMapRef: { name: signal-worker-config }
        - secretRef:    { name: signal-worker-secrets }
        ports:
        - name: metrics
          containerPort: 8080
        livenessProbe:
          httpGet:  { path: /healthz, port: 8080 }
          initialDelaySeconds: 30        # generous — Safety loads models on first batch
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:  { path: /readyz, port: 8080 }
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests: { cpu: "500m", memory: "2Gi" }
          limits:   { cpu: "1",    memory: "4Gi" }