# Headless service for the Safety StatefulSet's stable DNS.
# Pods become resolvable as signal-worker-safety-0.signal-worker-safety.signal.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: signal-worker-safety
  namespace: signal
  labels:
    app: signal-worker
    lens: safety
spec:
  clusterIP: None    # headless
  selector:
    app: signal-worker
    lens: safety
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
---
# Service used by Prometheus to discover all worker pods (all three lenses).
apiVersion: v1
kind: Service
metadata:
  name: signal-worker-metrics
  namespace: signal
  labels:
    app: signal-worker
spec:
  clusterIP: None
  selector:
    app: signal-worker
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080