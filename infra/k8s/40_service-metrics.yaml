# Headless service for the Safety StatefulSet's stable DNS.
# Pods become resolvable as signal-worker-safety-0.signal-worker-safety.signal.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: signal-worker-safety
  namespace: signal
  labels:
    app: signal-worker
    lens: safety
spec:
  clusterIP: None    # headless
  selector:
    app: signal-worker
    lens: safety
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
---
# Headless service for the Quality StatefulSet's stable DNS.
# Pods become resolvable as signal-worker-quality-0.signal-worker-quality.signal.svc.cluster.local
# Selector matches the labels in 31_statefulset-quality.yaml.
apiVersion: v1
kind: Service
metadata:
  name: signal-worker-quality
  namespace: signal
  labels:
    app: signal-worker
    lens: quality
spec:
  clusterIP: None    # headless
  selector:
    app: signal-worker
    lens: quality
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
---
# Service used by Prometheus to discover all worker pods (all four lenses).
# Selector is intentionally label-only so any new lens that carries
# `app=signal-worker` gets picked up automatically.
apiVersion: v1
kind: Service
metadata:
  name: signal-worker-metrics
  namespace: signal
  labels:
    app: signal-worker
spec:
  clusterIP: None
  selector:
    app: signal-worker
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080