# yaml-language-server: $schema=false
receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
      grpc:
        endpoint: "0.0.0.0:4317"

exporters:
  clickhouse:
    endpoint: tcp://${CLICKHOUSE_HOST}:${CLICKHOUSE_PORT}
    username: ${CLICKHOUSE_USER}
    password: ${CLICKHOUSE_PASSWORD}
    database: ${CLICKHOUSE_DATABASE}
    traces_table_name: otel_traces
    logs_table_name: otel_logs
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

service:
  pipelines:
    traces:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [clickhouse]
    logs:
      receivers:  [otlp]
      processors: [batch]
      exporters:  [clickhouse]
  telemetry:
    logs:
      level: warn
